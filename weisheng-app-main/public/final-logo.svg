<svg width="1000" height="1000" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#0A0A0A"/>
  
  <defs>
    <filter id="staticCoreGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Inner Ring (r=30, Gap at bottom) - Balanced for Avatar -->
  <circle cx="50" cy="50" r="30" stroke="#E8D5B5" stroke-width="4" stroke-dasharray="176.5 12" stroke-dashoffset="-6" transform="rotate(90 50 50)" stroke-linecap="butt" opacity="0.7" />

  <!-- Outer Ring (r=42, Gap at top) - Balanced for Avatar -->
  <circle cx="50" cy="50" r="42" stroke="#C9A96E" stroke-width="4" stroke-dasharray="251.9 12" stroke-dashoffset="-6" transform="rotate(-90 50 50)" stroke-linecap="butt" opacity="0.9" />

  <!-- Stable Central Core Sphere -->
  <circle cx="50" cy="50" r="4.5" fill="#FFF8E7" filter="url(#staticCoreGlow)" opacity="1" />
</svg>
